<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pinkflix | Buscador de series </title>
    <link rel="icon" href="./images/dot.svg">
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap"
      rel="stylesheet"
    />
    
    <link rel="stylesheet" crossorigin href="./assets/main-BFm7S_a6.css">
  </head>

  <body>
    <div class="page">
      <header class="page__header">
  
</header>

      <main class="page__main">
  <h1 class="title">
🍿 Buscador de series 🍿
  </h1>

  <!--FORMULARIO-->
  <form class="form js__form">
    <input 
    type="text"
    class="form__input js__input"
    placeholder="Buscar serie"
    />
    <button class="form__button js__button">Buscar</button>
  </form>

  <div class="container">
    <!--FAVORITOS-->
    <section class="favorites">
      <h2 class="favorites__title js__favorites__title">🩷 Favoritas 🩷</h2>
      <ul class="favorites__list js__favorites"></ul>
      <button class="favorites__reset js__reset">Borrar todo 🧹 </button>
    </section>

    <!--RESULTADOS-->
    <section class="results">
      <h2 class="results__title js__results__title">🎬 Luces, Cámara y Acción 🎬</h2>
      <ul class="results__list js__results"></ul> 
    </section>
  </div>
</main>

      <footer class="footer">
  <p class ="footer__text">Made with 💗 by Mari2</p>
</footer>
    </div>
    <script src="./js/main.js"></script>
  </body>
</html>
